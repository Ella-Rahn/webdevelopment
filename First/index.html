<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worlds Best Corn</title>
</head>

<body>

<h1 style="text-align:center; color:#31cc31;">🌽 CORN 🌽</h1>

<h2 style="text-align:center;" class="grown">"<b>Perfect</b> for grilling in the summer"</h2>

<div class="photo-op" style="text-align:center;">
    <img src="corn.jpeg" height="225" width="225" alt="corn"/>
</div>

<div class="video-marquee">
    <iframe width="560" height="315"
            src="https://www.youtube.com/embed/_caMQpiwiaU?si=H0YgWuxK8f1CXf9B"
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
</div>

</body>

<style>

    h2{
        color:#efbe27;
    }

    /* keeps the animation contained */
    .video-marquee{
        position:relative;
        width:100%;
        height:350px;
        overflow:hidden;
    }

    /* animate the iframe across the whole screen */
    .video-marquee iframe{
        position:absolute;
        top:0;
        animation: marqueeVideo 9s linear infinite;
    }

    /* full page marquee movement */
    @keyframes marqueeVideo{
        0%{
            transform: translateX(-600px); /* start off screen left */
        }
        100%{
            transform: translateX(100vw); /* move past right edge */
        }
    }

</style>

</html>
